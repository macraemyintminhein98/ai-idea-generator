<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Content Idea Generator</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center"><h1 class="text-2xl font-bold mb-6">Generate Content Ideas</h1><input id="keywordInput" type="text" placeholder="Enter keyword (e.g., 'sustainable living')" class="border p-2 rounded-md w-full mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"><button id="generateButton" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">Generate Ideas (0.99)</button><div id="ideasOutput" class="mt-6 text-left"><p class="text-gray-600">Your ideas will appear here.</p></div></div><script>document.getElementById('generateButton').addEventListener('click', async () => {const keyword = document.getElementById('keywordInput').value;const outputDiv = document.getElementById('ideasOutput');outputDiv.innerHTML = '<p class="text-blue-500">Generating ideas...</p>';const res = await fetch('/api/generate-ideas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keyword }) });const data = await res.json();if (data.ideas) { outputDiv.innerHTML = data.ideas.map(idea => `<p class="mb-2">- ${idea}</p>`).join(''); } else { outputDiv.innerHTML = `<p class="text-red-500">Error: ${data.error || 'Failed to generate ideas.'}</p>`;}});</script></body></html>
